<!DOCTYPE html>
<html>
<head>
    <title>Access Request</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: monospace; display: flex; justify-content: center; padding: 50px; }
        .terminal-form { border: 2px solid #f0f; padding: 40px; box-shadow: 0 0 15px #f0f; width: 450px; }
        input, select, textarea { background: #000; border: 1px solid #f0f; color: #fff; width: 100%; padding: 10px; margin: 10px 0; }
        input[type="submit"] { background: #f0f; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="terminal-form">
        <h2 style="color:#f0f">IDENT_CHECK</h2>
        <form>
            ID_NAME: <input type="text" placeholder="Enter Nickname">
            ACCESS_KEY: <input type="password" placeholder="••••••••">
            GENDER_CODE: <input type="radio" name="r" style="width:auto"> M <input type="radio" name="r" style="width:auto"> F
            <br>PERMISSION: <input type="checkbox" style="width:auto"> ROOT_ACCESS
            <select><option>ZONE_SELECT</option><option>EU_NORTH</option><option>AS_EAST</option></select>
            UPLINK_FILE: <input type="file">
            BIO_DATA: <textarea></textarea>
            <input type="submit" value="EXECUTE_ENTRY">
            <input type="reset" value="PURGE_FORM" style="background:#444;">
        </form>
        <p align="center"><a href="index.html" style="color:#f0f">REBOOT</a></p>
    </div>
</body>
</html>
